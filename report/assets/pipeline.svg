<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="520" viewBox="0 0 1400 520">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1f2937"/>
    </marker>
    <style>
      .title { font: 700 30px 'Microsoft YaHei', 'Segoe UI', sans-serif; fill: #111827; }
      .label { font: 600 23px 'Microsoft YaHei', 'Segoe UI', sans-serif; fill: #111827; }
      .small { font: 500 18px 'Microsoft YaHei', 'Segoe UI', sans-serif; fill: #374151; }
      .box { fill: #eef5ff; stroke: #1f2937; stroke-width: 2.5; rx: 12; ry: 12; }
      .box2 { fill: #eefaf1; stroke: #1f2937; stroke-width: 2.5; rx: 12; ry: 12; }
      .box3 { fill: #fff4e8; stroke: #1f2937; stroke-width: 2.5; rx: 12; ry: 12; }
      .dash { fill: none; stroke: #6b7280; stroke-width: 2; stroke-dasharray: 8 6; rx: 16; ry: 16; }
      .arrow { stroke: #1f2937; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <text x="700" y="42" text-anchor="middle" class="title">EEG → HRF-aware Condition → Mean + Residual CFM → ROI fMRI Prediction</text>

  <rect x="40" y="170" width="190" height="110" class="box"/>
  <text x="135" y="220" text-anchor="middle" class="label">EEG 输入 X</text>
  <text x="135" y="252" text-anchor="middle" class="small">26 通道 × 长时间窗</text>

  <rect x="290" y="155" width="240" height="140" class="box"/>
  <text x="410" y="205" text-anchor="middle" class="label">Temporal Encoder</text>
  <text x="410" y="238" text-anchor="middle" class="small">卷积 patch token</text>
  <text x="410" y="268" text-anchor="middle" class="small">+ Spectral bandpower</text>

  <rect x="590" y="155" width="250" height="140" class="box"/>
  <text x="715" y="205" text-anchor="middle" class="label">HRF-aware Conditioning</text>
  <text x="715" y="238" text-anchor="middle" class="small">cross-attention + HRF bias</text>
  <text x="715" y="268" text-anchor="middle" class="small">得到条件表示 C</text>

  <rect x="920" y="85" width="220" height="120" class="box2"/>
  <text x="1030" y="135" text-anchor="middle" class="label">Mean Head</text>
  <text x="1030" y="168" text-anchor="middle" class="small">μ = f_mean(C)</text>

  <rect x="920" y="270" width="220" height="145" class="box2"/>
  <text x="1030" y="320" text-anchor="middle" class="label">Residual CFM</text>
  <text x="1030" y="353" text-anchor="middle" class="small">R* = Y − sg(μ)</text>
  <text x="1030" y="381" text-anchor="middle" class="small">vθ(x_t, t, C)</text>

  <rect x="1210" y="155" width="155" height="140" class="box3"/>
  <text x="1287" y="205" text-anchor="middle" class="label">输出</text>
  <text x="1287" y="238" text-anchor="middle" class="small">Ŷ^(m) = μ + R^(m)</text>
  <text x="1287" y="268" text-anchor="middle" class="small">均值 / 区间 / 样本</text>

  <rect x="885" y="50" width="290" height="385" class="dash"/>
  <text x="1030" y="455" text-anchor="middle" class="small">双分支：先学确定性主干，再学条件残差分布</text>

  <path d="M230 225 L290 225" class="arrow"/>
  <path d="M530 225 L590 225" class="arrow"/>
  <path d="M840 225 C875 225, 875 145, 920 145" class="arrow"/>
  <path d="M840 225 C875 225, 875 340, 920 340" class="arrow"/>
  <path d="M1140 145 C1170 145, 1170 205, 1210 205" class="arrow"/>
  <path d="M1140 340 C1180 340, 1180 255, 1210 255" class="arrow"/>

  <text x="260" y="210" text-anchor="middle" class="small">Z</text>
  <text x="560" y="210" text-anchor="middle" class="small">C</text>
</svg>
